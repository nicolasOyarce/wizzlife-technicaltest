[tool:pytest]
DJANGO_SETTINGS_MODULE = config.settings.local
python_files = tests/*.py tests/**/*.py test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
    -v

[coverage:run]
source = apps
omit =
    */migrations/*
    */tests/*
    */__init__.py
    */admin.py

[coverage:report]
show_missing = True
skip_covered = False
fail_under = 80

[flake8]
max-line-length = 120
exclude =
    .venv,
    migrations,
    __pycache__,
    .git
ignore = E501, W503
