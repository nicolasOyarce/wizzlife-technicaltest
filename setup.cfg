[tool:pytest]
DJANGO_SETTINGS_MODULE = config.settings.local
python_files = tests/*.py tests/**/*.py test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
    -v
filterwarnings =
    ignore:Converter 'drf_format_suffix' is already registered\.:django.utils.deprecation.RemovedInDjango60Warning
    ignore:UserFactory\._after_postgeneration will stop saving the instance after postgeneration hooks in the next major release\.:DeprecationWarning
    ignore:'asyncio\.iscoroutinefunction' is deprecated and slated for removal in Python 3\.16; use inspect\.iscoroutinefunction\(\) instead:DeprecationWarning

[coverage:run]
source = apps
omit =
    */migrations/*
    */tests/*
    */__init__.py
    */admin.py

[coverage:report]
show_missing = True
skip_covered = False
fail_under = 80

[flake8]
max-line-length = 120
exclude =
    .venv,
    migrations,
    __pycache__,
    .git
ignore = E501, W503
