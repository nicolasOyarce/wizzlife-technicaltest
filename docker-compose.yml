services:
  # ─────────────────────────────────────
  # Base de datos PostgreSQL
  # ─────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wizzlife_db
      POSTGRES_USER: wizzlife
      POSTGRES_PASSWORD: wizzlife_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wizzlife -d wizzlife_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────
  # Aplicación Django
  # ─────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    environment:
      SECRET_KEY: docker-dev-secret-key-change-in-production
      DEBUG: "False"
      ALLOWED_HOSTS: "*"
      DATABASE_URL: postgres://wizzlife:wizzlife_secret@db:5432/wizzlife_db
      DB_SSL_REQUIRE: "False"
      CORS_ALLOW_ALL_ORIGINS: "True"
      ACCESS_TOKEN_LIFETIME_MINUTES: "60"
      REFRESH_TOKEN_LIFETIME_DAYS: "7"
      DJANGO_SETTINGS_MODULE: config.settings.production
      SECURE_SSL_REDIRECT: "False"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        python manage.py migrate --no-input &&
        python manage.py collectstatic --no-input &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 4 --worker-class gthread --timeout 60 --access-logfile - --error-logfile -

volumes:
  postgres_data:
